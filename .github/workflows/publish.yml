name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  mirror:
    name: Mirror to Public Repo
    runs-on: ssw-ubuntu-22.04-large
    timeout-minutes: 10
    env:
      PUBLIC_REPO_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: Mirror push
        run: ./hack/release-mirror.sh "${{ inputs.tag }}"
