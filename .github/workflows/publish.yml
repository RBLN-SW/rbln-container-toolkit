name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  mirror:
    name: Mirror to Public Repo
    runs-on: ubuntu-22.04-rbln
    timeout-minutes: 10
    env:
      PUBLIC_REPO_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
      PUBLIC_REPO_PAT: ${{ secrets.PUBLIC_REPO_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: Mirror push
        run: ./hack/release-mirror.sh "${{ inputs.tag }}"

  github-release:
    name: Create GitHub Release
    needs: mirror
    runs-on: ubuntu-22.04-rbln
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Create release
        run: ./hack/release-github.sh "${{ inputs.tag }}"
