name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: read

# Skip on the public mirror — self-hosted runners and required secrets only
# exist on the internal repo, so jobs would fail there even if dispatched.
jobs:
  mirror:
    name: Mirror to Public Repo
    if: github.repository != 'RBLN-SW/rbln-container-toolkit'
    runs-on: ssw-ubuntu-22.04-large
    timeout-minutes: 10
    env:
      PUBLIC_REPO_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
    steps:
      # Check out main (not the release tag) so the latest hack/ scripts run
      # regardless of which tag is being published. Past tags may ship with
      # older or missing release scripts. The script still pushes the requested
      # tag explicitly via `git push public "${TAG}"`.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Mirror push
        run: ./hack/release-mirror.sh "${{ inputs.tag }}"

  dockerhub:
    name: Push to Docker Hub
    needs: mirror
    if: ${{ github.repository != 'RBLN-SW/rbln-container-toolkit' && !contains(inputs.tag, '-rc') }}
    runs-on: ssw-ubuntu-22.04-large
    timeout-minutes: 15
    env:
      SSW_HARBOR_URL: ${{ secrets.SSW_HARBOR_URL }}
      SSW_HARBOR_USERNAME: ${{ secrets.SSW_HARBOR_USERNAME }}
      SSW_HARBOR_PASSWORD: ${{ secrets.SSW_HARBOR_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_CTK_USER }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_CTK_PW }}
    steps:
      # See mirror job for rationale on `ref: main`.
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Push to Docker Hub
        run: ./hack/release-dockerhub.sh "${{ inputs.tag }}"

  public-nexus:
    name: Push to Public Nexus
    needs: mirror
    # Skip on the public mirror (same rationale as mirror/dockerhub jobs):
    # self-hosted runner labels and the required Nexus secrets only exist on
    # the internal repo, so a dispatch on RBLN-SW/rbln-container-toolkit would
    # sit forever waiting for a runner that never picks it up.
    if: ${{ github.repository != 'RBLN-SW/rbln-container-toolkit' && !contains(inputs.tag, '-rc') }}
    runs-on: ssw-ubuntu-22.04-large
    timeout-minutes: 20
    env:
      NEXUS_PUBLIC_URL: ${{ secrets.NEXUS_PUBLIC_URL }}
      NEXUS_PUBLIC_USERNAME: ${{ secrets.NEXUS_PUBLIC_USERNAME }}
      NEXUS_PUBLIC_PASSWORD: ${{ secrets.NEXUS_PUBLIC_PASSWORD }}
    steps:
      # See mirror job for rationale on `ref: main`.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Push to public Nexus
        run: ./hack/release-nexus-public.sh "${{ inputs.tag }}"
