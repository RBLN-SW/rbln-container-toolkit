name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  mirror:
    name: Mirror to Public Repo
    runs-on: ssw-ubuntu-22.04-large
    timeout-minutes: 10
    env:
      PUBLIC_REPO_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
    steps:
      # Check out main (not the release tag) so the latest hack/ scripts run
      # regardless of which tag is being published. Past tags may ship with
      # older or missing release scripts. The script still pushes the requested
      # tag explicitly via `git push public "${TAG}"`.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Mirror push
        run: ./hack/release-mirror.sh "${{ inputs.tag }}"

  dockerhub:
    name: Push to Docker Hub
    needs: mirror
    if: ${{ !contains(inputs.tag, '-rc') }}
    runs-on: ssw-ubuntu-22.04-large
    timeout-minutes: 15
    env:
      SSW_HARBOR_URL: ${{ secrets.SSW_HARBOR_URL }}
      SSW_HARBOR_USERNAME: ${{ secrets.SSW_HARBOR_USERNAME }}
      SSW_HARBOR_PASSWORD: ${{ secrets.SSW_HARBOR_PASSWORD }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      # See mirror job for rationale on `ref: main`.
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Push to Docker Hub
        run: ./hack/release-dockerhub.sh "${{ inputs.tag }}"
