name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04-rbln
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build and test
        run: ./hack/release-build.sh "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 3

  package:
    name: Package & Upload
    needs: build-and-test
    runs-on: ubuntu-22.04-rbln
    timeout-minutes: 20
    env:
      NEXUS_URL: ${{ secrets.SSW_NEXUS_CE_URL }}
      NEXUS_USERNAME: ${{ secrets.SSW_NEXUS_CE_USERNAME }}
      NEXUS_PASSWORD: ${{ secrets.SSW_NEXUS_CE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/
      - name: Restore permissions
        run: chmod +x bin/*
      - name: Package and upload
        run: ./hack/release-package.sh "${GITHUB_REF_NAME}" "${{ inputs.dry_run }}"
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 3

  docker:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-22.04-rbln
    timeout-minutes: 20
    env:
      SSW_HARBOR_URL: ${{ secrets.SSW_HARBOR_URL }}
      SSW_HARBOR_USERNAME: ${{ secrets.SSW_HARBOR_USERNAME }}
      SSW_HARBOR_PASSWORD: ${{ secrets.SSW_HARBOR_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        run: ./hack/release-docker.sh "${GITHUB_REF_NAME}" "${{ inputs.dry_run }}"
